# LianCore V3 - macOS CI/CD Build Verification
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-14
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-13
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install CMake 3.28.6
        run: |
          curl -L -o cmake.tar.gz "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-macos-universal.tar.gz"
          tar xzf cmake.tar.gz
          echo "$(pwd)/cmake-3.28.6-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH

      - name: System Diagnostics
        run: |
          echo "=== System Info ==="
          uname -a
          sw_vers
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "xcodebuild not available"
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Compilers ==="
          cc --version 2>&1
          c++ --version 2>&1
          echo "=== xcode-select ==="
          xcode-select -p 2>&1
          echo "=== Working Directory ==="
          pwd
          ls -la

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v4

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip \
            "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          echo "JUCE installed at $(pwd)/JUCE"
          ls -la JUCE/

      - name: Configure CMake
        id: cmake_configure
        run: |
          mkdir -p build
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=Release \
            --log-level=DEBUG \
            > build/cmake_configure.log 2>&1 || CMake_ERR=$?
          CMAKE_EXIT=${CMake_ERR:-$?}
          echo "CMake exit code: $CMAKE_EXIT"
          if [ "$CMAKE_EXIT" != "0" ]; then
            echo "=== CMake Error (last 100 lines) ==="
            tail -100 build/cmake_configure.log
            echo "=== CMakeError.log ==="
            cat build/CMakeFiles/CMakeError.log 2>/dev/null || echo "(no CMakeError.log)"
            # Extract error lines for annotations
            grep -i 'error\|fatal\|CMake Error' build/cmake_configure.log | head -20 | while read line; do
              echo "::error file=CMakeLists.txt::${line}"
            done
            exit $CMAKE_EXIT
          fi

      - name: Build VST3 + AU
        run: |
          cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Verify Build Artifacts
        run: |
          echo "=== VST3 ==="
          ls -la build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore || echo "VST3 binary not found"
          echo "=== AU ==="
          ls -la build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore || echo "AU binary not found"

      - name: Build Tests
        run: |
          cmake --build build --config Release --target LianCoreTests --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          ./build/tests/Release/LianCoreTests -s

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build/LianCore_artefacts/Release/VST3/
            build/LianCore_artefacts/Release/AU/
          retention-days: 7