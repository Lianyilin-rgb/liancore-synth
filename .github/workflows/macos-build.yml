# LianCore V3 - macOS CI/CD Build Verification
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-14
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-14
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          echo "Using default Xcode:"
          xcodebuild -version 2>&1 || echo "xcodebuild not available"
          xcode-select -p 2>&1 || echo "xcode-select not set"

      - name: Install CMake 3.28.6
        run: |
          curl -L -o cmake.tar.gz "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-macos-universal.tar.gz"
          tar xzf cmake.tar.gz
          echo "$(pwd)/cmake-3.28.6-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH

      - name: System Diagnostics
        run: |
          echo "=== System Info ==="
          uname -a
          sw_vers
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "xcodebuild not available"
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Compilers ==="
          cc --version 2>&1
          c++ --version 2>&1
          echo "=== xcode-select ==="
          xcode-select -p 2>&1
          echo "=== Working Directory ==="
          pwd
          ls -la

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v7

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip \
            "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          echo "JUCE installed at $(pwd)/JUCE"
          ls -la JUCE/

      - name: Configure CMake (Xcode)
        id: cmake_configure
        run: |
          mkdir -p build
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=Release \
            --log-level=STATUS \
            2>&1 | tee build/cmake_configure.log
          CMAKE_EXIT=${PIPESTATUS[0]}
          echo "CMake exit code: $CMAKE_EXIT"
          if [ "$CMAKE_EXIT" != "0" ]; then
            grep -i 'error|fatal|CMake Error' build/cmake_configure.log | head -20 | while read line; do
              echo "::error file=CMakeLists.txt::${line}"
            done
            exit $CMAKE_EXIT
          fi
          echo "=== Xcode schemes ==="
          xcodebuild -project build/LianCore.xcodeproj -list 2>&1 | head -40

      - name: Build LianCore (Static Library)
        id: build_static
        run: |
          echo "=== Building LianCore static library ==="
          cmake --build build --target LianCore --config Release --parallel $(sysctl -n hw.logicalcpu) 2>&1 | tee build/build_liancore.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -50 build/build_liancore.log
            exit $BUILD_EXIT
          fi

      - name: Build Plugin Targets (LianCore_All)
        id: build_plugin
        run: |
          echo "=== Building all plugin formats (LianCore_All) ==="
          cmake --build build --target LianCore_All --config Release --parallel $(sysctl -n hw.logicalcpu) 2>&1 | tee build/build_plugin.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -50 build/build_plugin.log
            exit $BUILD_EXIT
          fi
          echo "=== Build artifacts ==="
          find build/LianCore_artefacts -type f 2>/dev/null | head -50
          echo "=== VST3 bundles ==="
          find build -name "*.vst3" -type d 2>/dev/null | head -20
          echo "=== AU components ==="
          find build -name "*.component" -type d 2>/dev/null | head -20
          echo "=== Mach-O binaries ==="
          find build -type f -perm +111 2>/dev/null | head -20
          echo "=== Build dir tree ==="
          find build -maxdepth 3 -type d 2>/dev/null | head -40
          echo "=== All LianCore binaries ==="
          find build -name "LianCore" -type f 2>/dev/null | head -20

      - name: Verify Build Artifacts
        run: |
          echo "=== VST3 Binary ==="
          VST3_BIN="build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore"
          if [ -f "$VST3_BIN" ]; then
            ls -la "$VST3_BIN"
            echo "VST3 binary: OK"
          else
            echo "VST3 binary: NOT FOUND, searching..."
            find build -path "*/MacOS/LianCore" -type f 2>/dev/null | head -10
          fi
          echo "=== AU Binary ==="
          AU_BIN="build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore"
          if [ -f "$AU_BIN" ]; then
            ls -la "$AU_BIN"
            echo "AU binary: OK"
          else
            echo "AU binary: NOT FOUND, searching..."
            find build -path "*/MacOS/LianCore" -type f 2>/dev/null | head -10
          fi
          find build/LianCore_artefacts/Release -type f 2>/dev/null | head -50

      - name: Build Tests
        run: |
          cmake --build build --target LianCoreTests --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 ./build/tests/Release/LianCoreTests -s -r compact || TEST_EXIT=$?
          else
            ./build/tests/Release/LianCoreTests -s -r compact || TEST_EXIT=$?
          fi
          echo "Test exit code: ${TEST_EXIT:-0}"
          if [ "${TEST_EXIT:-0}" != "0" ] && [ "${TEST_EXIT:-0}" != "133" ] && [ "${TEST_EXIT:-0}" != "132" ]; then
            echo "::error::Tests failed with exit code ${TEST_EXIT:-0}"
            exit ${TEST_EXIT:-0}
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build/LianCore_artefacts/Release/VST3/
            build/LianCore_artefacts/Release/AU/
          retention-days: 7

      - name: Package DMG (arm64)
        if: matrix.arch == 'arm64'
        run: |
          VST3_BIN="build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore"
          AU_BIN="build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore"
          HAS_BINARIES=false
          if [ -f "$VST3_BIN" ]; then
            echo "VST3 binary found: $(ls -la $VST3_BIN)"
            HAS_BINARIES=true
          else
            echo "::warning::VST3 binary not found at $VST3_BIN"
          fi
          if [ -f "$AU_BIN" ]; then
            echo "AU binary found: $(ls -la $AU_BIN)"
            HAS_BINARIES=true
          else
            echo "::warning::AU binary not found at $AU_BIN"
          fi
          if [ "$HAS_BINARIES" = "false" ]; then
            echo "::error::No plugin binaries found! Aborting."
            find build/LianCore_artefacts -type f 2>/dev/null | head -50
            find build -name "*.vst3" -o -name "*.component" 2>/dev/null | head -20
            find build -name "LianCore" -type f 2>/dev/null | head -20
            find build -maxdepth 4 -type d 2>/dev/null | sort | head -50
            exit 1
          fi
          mkdir -p dmg_staging
          if [ -d "build/LianCore_artefacts/Release/VST3/LianCore.vst3" ]; then
            cp -R build/LianCore_artefacts/Release/VST3/LianCore.vst3 dmg_staging/
            echo "VST3 copied to DMG staging"
          fi
          if [ -d "build/LianCore_artefacts/Release/AU/LianCore.component" ]; then
            cp -R build/LianCore_artefacts/Release/AU/LianCore.component dmg_staging/
            echo "AU copied to DMG staging"
          fi
          ls -laR dmg_staging/
          hdiutil create -volname "LianCore V3" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            LianCoreV3-macOS.dmg
          ls -la LianCoreV3-macOS.dmg
          DMG_SIZE=$(stat -f%z LianCoreV3-macOS.dmg 2>/dev/null || echo "0")
          echo "DMG size: $DMG_SIZE bytes"
          if [ "$DMG_SIZE" -lt 10000000 ]; then
            echo "::warning::DMG is smaller than 10MB, may be incomplete"
          fi

      - name: Upload DMG Artifact
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LianCoreV3-macOS.dmg
          retention-days: 7