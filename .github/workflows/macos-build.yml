# LianCore V3 - macOS CI/CD Build Verification
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-14
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-14
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          xcodebuild -version 2>&1 || echo "xcodebuild not available"
          xcode-select -p 2>&1 || echo "xcode-select not set"

      - name: Install CMake 3.28.6
        run: |
          curl -L -o cmake.tar.gz "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-macos-universal.tar.gz"
          tar xzf cmake.tar.gz
          echo "$(pwd)/cmake-3.28.6-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH

      - name: System Diagnostics
        run: |
          uname -a
          sw_vers
          cmake --version
          c++ --version 2>&1 | head -2

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v19

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          ls -la JUCE/

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build -G "Unix Makefiles" -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release 2>&1 | tee build/cmake_configure.log
          CMAKE_EXIT=${PIPESTATUS[0]}
          if [ "$CMAKE_EXIT" != "0" ]; then
            grep -i 'error\|fatal' build/cmake_configure.log | head -20 | while read line; do echo "::error file=CMakeLists.txt::${line}"; done
            exit $CMAKE_EXIT
          fi
          echo "CMake configure succeeded"

      - name: Build All
        run: |
          cmake --build build --parallel $(sysctl -n hw.logicalcpu) 2>&1 | tee build/build_all.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -80 build/build_all.log
            grep -i 'error:' build/build_all.log | head -20 | while read line; do echo "::error::${line}"; done
            exit $BUILD_EXIT
          fi
          echo "=== .o files count ==="
          find build -name "*.o" -type f 2>/dev/null | wc -l

      - name: Create Static Library from .o
        run: |
          OBJ_COUNT=$(find build -name "*.o" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Total .o files: $OBJ_COUNT"
          if [ "$OBJ_COUNT" -eq 0 ]; then
            echo "::error::No .o files found!"
            find build -maxdepth 3 -type d 2>/dev/null | head -30
            exit 1
          fi
          find build -name "*.o" -type f 2>/dev/null | xargs ar rcs build/libLianCore.a 2>&1
          AR_EXIT=$?
          if [ "$AR_EXIT" != "0" ]; then
            echo "::error::ar rcs failed (exit $AR_EXIT)"
            exit 1
          fi
          echo "Static library: $(ls -lh build/libLianCore.a)"
          file build/libLianCore.a 2>/dev/null

      - name: Link Plugin Bundles from Static Library
        run: |
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo "")
          SDK_FLAG=""
          [ -n "$SDK_PATH" ] && SDK_FLAG="-isysroot $SDK_PATH"
          ARCH_FLAG="-arch ${{ matrix.cmake_arch }}"
          FWKS="-framework Accelerate -framework AudioToolbox -framework AudioUnit"
          FWKS="$FWKS -framework Carbon -framework Cocoa -framework CoreAudio -framework CoreAudioKit"
          FWKS="$FWKS -framework CoreFoundation -framework CoreMIDI -framework CoreServices"
          FWKS="$FWKS -framework Foundation -framework IOKit -framework Metal -framework MetalKit"
          FWKS="$FWKS -framework QuartzCore -framework Security -framework WebKit"

          # VST3 Bundle
          echo "=== Creating VST3 Bundle ==="
          VST3_DIR="build/LianCore_artefacts/Release/VST3/LianCore.vst3"
          mkdir -p "$VST3_DIR/Contents/MacOS" "$VST3_DIR/Contents/Resources"
          c++ -bundle -Wl,-force_load build/libLianCore.a $SDK_FLAG $ARCH_FLAG $FWKS -stdlib=libc++ -lobjc -o "$VST3_DIR/Contents/MacOS/LianCore" 2>&1 | tee build/vst3_link.log
          if [ ${PIPESTATUS[0]} != "0" ]; then
            echo "::error::VST3 link failed"
            tail -30 build/vst3_link.log
            exit 1
          fi
          echo "VST3: $(ls -lh $VST3_DIR/Contents/MacOS/LianCore)"
          file "$VST3_DIR/Contents/MacOS/LianCore" 2>/dev/null

          cat > "$VST3_DIR/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key><string>English</string>
    <key>CFBundleExecutable</key><string>LianCore</string>
    <key>CFBundleIdentifier</key><string>com.lianyilin.liancore.vst3</string>
    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
    <key>CFBundleName</key><string>LianCore</string>
    <key>CFBundlePackageType</key><string>BNDL</string>
    <key>CFBundleShortVersionString</key><string>3.0.0</string>
    <key>CFBundleVersion</key><string>3.0.0</string>
    <key>NSHighResolutionCapable</key><true/>
</dict>
</plist>
PLIST
          echo "BNDL????" > "$VST3_DIR/Contents/PkgInfo"

          # AU Bundle
          echo "=== Creating AU Bundle ==="
          AU_DIR="build/LianCore_artefacts/Release/AU/LianCore.component"
          mkdir -p "$AU_DIR/Contents/MacOS" "$AU_DIR/Contents/Resources"
          c++ -bundle -Wl,-force_load build/libLianCore.a $SDK_FLAG $ARCH_FLAG $FWKS -stdlib=libc++ -lobjc -o "$AU_DIR/Contents/MacOS/LianCore" 2>&1 | tee build/au_link.log
          if [ ${PIPESTATUS[0]} != "0" ]; then
            echo "::error::AU link failed"
            tail -30 build/au_link.log
            exit 1
          fi
          echo "AU: $(ls -lh $AU_DIR/Contents/MacOS/LianCore)"
          file "$AU_DIR/Contents/MacOS/LianCore" 2>/dev/null

          cat > "$AU_DIR/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key><string>English</string>
    <key>CFBundleExecutable</key><string>LianCore</string>
    <key>CFBundleIdentifier</key><string>com.lianyilin.liancore.au</string>
    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
    <key>CFBundleName</key><string>LianCore</string>
    <key>CFBundlePackageType</key><string>BNDL</string>
    <key>CFBundleShortVersionString</key><string>3.0.0</string>
    <key>CFBundleVersion</key><string>3.0.0</string>
    <key>NSHighResolutionCapable</key><true/>
    <key>AudioComponents</key>
    <array>
        <dict>
            <key>description</key><string>LianCore V3</string>
            <key>factoryFunction</key><string>LianCoreAUFactory</string>
            <key>manufacturer</key><string>LnCr</string>
            <key>name</key><string>LianCore V3</string>
            <key>subtype</key><string>LnCr</string>
            <key>type</key><string>aumu</string>
            <key>version</key><integer>196608</integer>
        </dict>
    </array>
</dict>
</plist>
PLIST
          echo "BNDL????" > "$AU_DIR/Contents/PkgInfo"

      - name: Build Tests
        run: |
          cmake --build build --target LianCoreTests --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 ./build/tests/LianCoreTests -s -r compact || TEST_EXIT=$?
          else
            ./build/tests/LianCoreTests -s -r compact || TEST_EXIT=$?
          fi
          if [ "${TEST_EXIT:-0}" = "0" ] || [ "${TEST_EXIT:-0}" = "133" ] || [ "${TEST_EXIT:-0}" = "132" ]; then
            echo "Tests OK"
          else
            echo "::error::Tests failed (exit ${TEST_EXIT:-0})"
            exit ${TEST_EXIT:-0}
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build/LianCore_artefacts/Release/VST3/
            build/LianCore_artefacts/Release/AU/
          retention-days: 7

      - name: Package DMG (arm64)
        if: matrix.arch == 'arm64'
        run: |
          VST3_BIN="build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore"
          AU_BIN="build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore"
          HAS_BIN=false
          [ -f "$VST3_BIN" ] && echo "VST3: $(ls -lh $VST3_BIN)" && HAS_BIN=true
          [ -f "$AU_BIN" ] && echo "AU: $(ls -lh $AU_BIN)" && HAS_BIN=true
          if [ "$HAS_BIN" = "false" ]; then
            echo "::error::No binaries found for DMG!"
            exit 1
          fi
          mkdir -p dmg_staging
          [ -d "build/LianCore_artefacts/Release/VST3/LianCore.vst3" ] && cp -R build/LianCore_artefacts/Release/VST3/LianCore.vst3 dmg_staging/
          [ -d "build/LianCore_artefacts/Release/AU/LianCore.component" ] && cp -R build/LianCore_artefacts/Release/AU/LianCore.component dmg_staging/
          hdiutil create -volname "LianCore V3" -srcfolder dmg_staging -ov -format UDZO LianCoreV3-macOS.dmg
          DMG_SIZE=$(stat -f%z LianCoreV3-macOS.dmg 2>/dev/null || echo "0")
          echo "DMG: $(ls -lh LianCoreV3-macOS.dmg)"
          if [ "$DMG_SIZE" -lt 10000000 ]; then
            echo "::warning::DMG < 10MB"
          fi

      - name: Upload DMG Artifact
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LianCoreV3-macOS.dmg
          retention-days: 7