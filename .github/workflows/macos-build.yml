# LianCore V3 - macOS CI/CD Build Verification
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-14
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-14
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          xcodebuild -version 2>&1 || echo "xcodebuild not available"
          xcode-select -p 2>&1 || echo "xcode-select not set"

      - name: Install CMake 3.28.6
        run: |
          curl -L -o cmake.tar.gz "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-macos-universal.tar.gz"
          tar xzf cmake.tar.gz
          echo "$(pwd)/cmake-3.28.6-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH

      - name: System Diagnostics
        run: |
          uname -a
          sw_vers
          cmake --version
          c++ --version 2>&1 | head -2

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v21

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          ls -la JUCE/

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build -G "Unix Makefiles" -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release 2>&1 | tee build/cmake_configure.log
          CMAKE_EXIT=${PIPESTATUS[0]}
          if [ "$CMAKE_EXIT" != "0" ]; then
            grep -i 'error\|fatal' build/cmake_configure.log | head -20 | while read line; do echo "::error file=CMakeLists.txt::${line}"; done
            exit $CMAKE_EXIT
          fi
          echo "CMake configure OK"

      - name: Build All
        run: |
          cmake --build build --parallel $(sysctl -n hw.logicalcpu) 2>&1 | tee build/build_all.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -80 build/build_all.log
            grep -i 'error:' build/build_all.log | head -20 | while read line; do echo "::error::${line}"; done
            exit $BUILD_EXIT
          fi
          echo "=== .o count ==="
          find build -name "*.o" -type f 2>/dev/null | wc -l

      - name: List CMake Targets
        run: |
          echo "=== Available CMake targets ==="
          cmake --build build --target help 2>&1 | head -50 || echo "(target help failed)"
          echo "=== Looking for plugin binaries ==="
          find build -name "LianCore*" -type f 2>/dev/null | head -20 || echo "(none found)"
          echo "=== Directory structure ==="
          find build -maxdepth 2 -type d 2>/dev/null | sort | head -30

      - name: Create Plugin Bundles
        run: |
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo "")
          SDK_FLAG=""
          [ -n "$SDK_PATH" ] && SDK_FLAG="-isysroot $SDK_PATH"
          ARCH_FLAG="-arch ${{ matrix.cmake_arch }}"
          FWKS="-framework Accelerate -framework AudioToolbox -framework AudioUnit"
          FWKS="$FWKS -framework Carbon -framework Cocoa -framework CoreAudio -framework CoreAudioKit"
          FWKS="$FWKS -framework CoreFoundation -framework CoreMIDI -framework CoreServices"
          FWKS="$FWKS -framework Foundation -framework IOKit -framework Metal -framework MetalKit"
          FWKS="$FWKS -framework QuartzCore -framework Security -framework WebKit"

          # Strategy: Try CMake target first, then find any plugin binary, finally manual link
          echo "=== Strategy 1: Try CMake LianCore_All target ==="
          if cmake --build build --target LianCore_All 2>&1 | tail -20; then
            echo "LianCore_All build succeeded"
          else
            echo "LianCore_All build failed (expected with JUCE 8.0.14)"
          fi

          echo "=== Strategy 2: Find any LianCore binaries ==="
          find build -name "LianCore*" -type f 2>/dev/null | head -20 || echo "(none found)"
          echo "=== artefact dir ==="
          ls -laR build/LianCore_artefacts/ 2>/dev/null | head -30 || echo "(artefact dir not found)"

          VST3_DIR="build/LianCore_artefacts/Release/VST3/LianCore.vst3"
          mkdir -p "$VST3_DIR/Contents/MacOS" "$VST3_DIR/Contents/Resources"

          echo "=== Strategy 3: Manual link with LianCore.dir .o files ==="
          find build -path "*/LianCore.dir/*" -name "*.o" -type f 2>/dev/null > build/objs.txt
          find build -maxdepth 1 -name "*.o" -type f 2>/dev/null >> build/objs.txt
          OBJ_COUNT=$(wc -l < build/objs.txt | tr -d ' ')
          echo "Linking with $OBJ_COUNT .o files"

          if [ "$OBJ_COUNT" -eq 0 ]; then
            echo "::error::No .o files in LianCore.dir!"
            find build -name "*.o" -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "Linking VST3..."
          c++ -v -bundle @build/objs.txt $SDK_FLAG $ARCH_FLAG $FWKS -stdlib=libc++ -lobjc -Wl,-undefined,dynamic_lookup -o "$VST3_DIR/Contents/MacOS/LianCore" 2>&1 | tee build/vst3_link.log
          LINK_EXIT=${PIPESTATUS[0]}
          if [ "$LINK_EXIT" != "0" ]; then
            echo "::error::VST3 link failed (exit code $LINK_EXIT)"
            echo "=== Last 80 lines of link log ==="
            tail -80 build/vst3_link.log
            echo "=== Undefined symbols ==="
            grep -i 'undefined' build/vst3_link.log | head -30 || echo "(no undefined symbol errors found)"
            echo "=== Duplicate symbols ==="
            grep -i 'duplicate' build/vst3_link.log | head -20 || echo "(no duplicate symbols found)"
            echo "=== All errors ==="
            grep -i 'error' build/vst3_link.log | head -30 || echo "(no error lines found)"
            exit 1
          fi
          echo "VST3: $(ls -lh $VST3_DIR/Contents/MacOS/LianCore)"
          file "$VST3_DIR/Contents/MacOS/LianCore" 2>/dev/null

          AU_DIR="build/LianCore_artefacts/Release/AU/LianCore.component"
          mkdir -p "$AU_DIR/Contents/MacOS" "$AU_DIR/Contents/Resources"
          echo "Linking AU..."
          c++ -bundle @build/objs.txt $SDK_FLAG $ARCH_FLAG $FWKS -stdlib=libc++ -lobjc -Wl,-undefined,dynamic_lookup -o "$AU_DIR/Contents/MacOS/LianCore" 2>&1 | tee build/au_link.log
          LINK_EXIT=${PIPESTATUS[0]}
          if [ "$LINK_EXIT" != "0" ]; then
            echo "::error::AU link failed (exit code $LINK_EXIT)"
            tail -80 build/au_link.log
            grep -i 'undefined' build/au_link.log | head -30 || echo "(no undefined symbols found)"
            exit 1
          fi
          echo "AU: $(ls -lh $AU_DIR/Contents/MacOS/LianCore)"
          file "$AU_DIR/Contents/MacOS/LianCore" 2>/dev/null

          python3 scripts/create_macos_plist.py \
            "build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents" \
            "build/LianCore_artefacts/Release/AU/LianCore.component/Contents"

      - name: Upload Link Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: link-logs-${{ matrix.arch }}
          path: |
            build/vst3_link.log
            build/au_link.log
            build/objs.txt
          retention-days: 3

      - name: Build Tests
        run: |
          cmake --build build --target LianCoreTests --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 ./build/tests/LianCoreTests -s -r compact || TEST_EXIT=$?
          else
            ./build/tests/LianCoreTests -s -r compact || TEST_EXIT=$?
          fi
          if [ "${TEST_EXIT:-0}" = "0" ] || [ "${TEST_EXIT:-0}" = "133" ] || [ "${TEST_EXIT:-0}" = "132" ]; then
            echo "Tests OK"
          else
            echo "::error::Tests failed (exit ${TEST_EXIT:-0})"
            exit ${TEST_EXIT:-0}
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build/LianCore_artefacts/Release/VST3/
            build/LianCore_artefacts/Release/AU/
          retention-days: 7

      - name: Download Resources from GitHub Release
        if: matrix.arch == 'arm64'
        run: |
          echo "=== Downloading resources from GitHub Release v3.0.0 ==="
          mkdir -p download_resources

          # 使用 GitHub CLI 下载 Release 资产
          # GITHUB_TOKEN 由 GitHub Actions 自动提供
          ASSET_URL="https://api.github.com/repos/Lianyilin-rgb/liancore-synth/releases/tags/v3.0.0"

          # 获取资产列表
          echo "获取 Release 资产列表..."
          ASSETS_JSON=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$ASSET_URL" | jq '.assets')

          ASSET_COUNT=$(echo "$ASSETS_JSON" | jq 'length')
          echo "Release 资产数量: $ASSET_COUNT"

          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "::warning::Release 中没有资产，DMG 将不包含资源文件"
            echo "::warning::请先运行 scripts/upload_release_assets.py 上传资源"
          else
            # 下载所有资产
            echo "$ASSETS_JSON" | jq -r '.[] | "\(.name) \(.browser_download_url)"' | while read -r name url; do
              echo "下载: $name"
              curl -sL -o "download_resources/$name" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$url"
              if [ -f "download_resources/$name" ]; then
                SIZE=$(ls -lh "download_resources/$name" | awk '{print $5}')
                echo "  完成: $SIZE"
              else
                echo "::warning::下载失败: $name"
              fi
            done
          fi

          echo "=== 下载完成 ==="
          ls -la download_resources/ 2>/dev/null

      - name: Package DMG (arm64)
        if: matrix.arch == 'arm64'
        run: |
          set +e  # Disable immediate exit on error for debugging
          VST3_BIN="build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore"
          AU_BIN="build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore"
          echo "=== Debug: artefact tree ==="
          ls -laR build/LianCore_artefacts/ 2>/dev/null | head -30 || echo "(artefact dir not found)"
          echo "=== Checking binaries ==="
          HAS_BIN=false
          if [ -f "$VST3_BIN" ]; then
            echo "VST3: $(ls -lh $VST3_BIN)"
            file "$VST3_BIN" 2>/dev/null
            HAS_BIN=true
          else
            echo "VST3 binary NOT found at: $VST3_BIN"
          fi
          if [ -f "$AU_BIN" ]; then
            echo "AU: $(ls -lh $AU_BIN)"
            file "$AU_BIN" 2>/dev/null
            HAS_BIN=true
          else
            echo "AU binary NOT found at: $AU_BIN"
          fi
          if [ "$HAS_BIN" = "false" ]; then
            echo "::error::No binaries for DMG!"
            exit 1
          fi
          mkdir -p dmg_staging
          [ -d "build/LianCore_artefacts/Release/VST3/LianCore.vst3" ] && cp -R build/LianCore_artefacts/Release/VST3/LianCore.vst3 dmg_staging/
          [ -d "build/LianCore_artefacts/Release/AU/LianCore.component" ] && cp -R build/LianCore_artefacts/Release/AU/LianCore.component dmg_staging/

          # =========================================================================
          # 复制资源文件到 DMG: 预设库、波表库、AI 模型
          # 优先从 GitHub Release 下载的目录获取，其次从本地 data/ 和 models/ 目录
          # =========================================================================
          echo "=== Copying resources to DMG staging ==="
          mkdir -p dmg_staging/Resources/Wavetables
          mkdir -p dmg_staging/Resources/Models

          # 辅助函数: 复制文件到 DMG staging，优先从 download_resources 获取
          copy_resource() {
            local asset_name="$1"
            local dest_path="$2"
            if [ -f "download_resources/$asset_name" ]; then
              cp "download_resources/$asset_name" "$dest_path"
              echo "  $asset_name copied from Release (size: $(ls -lh download_resources/$asset_name | awk '{print $5}'))"
            elif [ -f "data/$asset_name" ]; then
              cp "data/$asset_name" "$dest_path"
              echo "  $asset_name copied from local data/ (size: $(ls -lh data/$asset_name | awk '{print $5}'))"
            else
              echo "  $asset_name NOT FOUND - skipping"
            fi
          }

          # 预设库主文件 (百万级, 3.67 GB) - 分片下载并重组
          # 分片文件名: preset_library_1M.db.part000, preset_library_1M.db.part001
          if ls download_resources/preset_library_1M.db.part* 1>/dev/null 2>&1; then
            echo "重组预设库分片..."
            cat download_resources/preset_library_1M.db.part* > dmg_staging/Resources/preset_library_1M.db
            echo "  preset_library_1M.db reassembled ($(ls -lh dmg_staging/Resources/preset_library_1M.db | awk '{print $5}'))"
          elif [ -f "download_resources/preset_library_1M.db" ]; then
            cp download_resources/preset_library_1M.db dmg_staging/Resources/
            echo "  preset_library_1M.db copied from Release"
          elif [ -f "data/preset_library_1M.db" ]; then
            cp data/preset_library_1M.db dmg_staging/Resources/
            echo "  preset_library_1M.db copied from local data/"
          else
            echo "  preset_library_1M.db NOT FOUND - skipping"
          fi

          # 工厂预设 (378 MB, 100k 预设)
          copy_resource "factory_presets.db" "dmg_staging/Resources/factory_presets.db"

          # 波表库 (100 个工厂波表, ~100 MB)
          # 优先从 download_resources 解压
          if [ -f "download_resources/factory_wavetables.zip" ]; then
            echo "从 Release 解压波表库..."
            unzip -qo download_resources/factory_wavetables.zip -d dmg_staging/Resources/Wavetables/
            WT_COUNT=$(ls dmg_staging/Resources/Wavetables/*.wav 2>/dev/null | wc -l | tr -d ' ')
            echo "  Wavetables extracted: $WT_COUNT files"
          elif [ -d "data/factory_wavetables" ] && [ "$(ls data/factory_wavetables/*.wav 2>/dev/null | wc -l)" -gt 0 ]; then
            cp -r data/factory_wavetables/*.wav dmg_staging/Resources/Wavetables/
            WT_COUNT=$(ls dmg_staging/Resources/Wavetables/*.wav 2>/dev/null | wc -l | tr -d ' ')
            echo "  Wavetables copied from local: $WT_COUNT files"
          else
            echo "  Wavetables NOT FOUND - skipping"
          fi

          # AI 模型 (5 个 ONNX 模型, ~4.5 MB)
          # 从 download_resources 复制所有 .onnx 文件
          if ls download_resources/*.onnx 1>/dev/null 2>&1; then
            cp download_resources/*.onnx dmg_staging/Resources/Models/
            MODEL_COUNT=$(ls dmg_staging/Resources/Models/*.onnx 2>/dev/null | wc -l | tr -d ' ')
            echo "  AI models copied from Release: $MODEL_COUNT files"
          elif ls models/*.onnx 1>/dev/null 2>&1; then
            cp models/*.onnx dmg_staging/Resources/Models/
            MODEL_COUNT=$(ls dmg_staging/Resources/Models/*.onnx 2>/dev/null | wc -l | tr -d ' ')
            echo "  AI models copied from local: $MODEL_COUNT files"
          else
            echo "  ONNX models NOT FOUND - skipping"
          fi

          echo "=== DMG staging contents ==="
          find dmg_staging -type f | head -30
          DMG_SRC_SIZE=$(du -sh dmg_staging | awk '{print $1}')
          echo "  DMG source size: $DMG_SRC_SIZE"

          hdiutil create -volname "LianCore V3" -srcfolder dmg_staging -ov -format UDZO LianCoreV3-macOS.dmg
          DMG_SIZE=$(stat -f%z LianCoreV3-macOS.dmg 2>/dev/null || echo "0")
          echo "DMG: $(ls -lh LianCoreV3-macOS.dmg)"
          if [ "$DMG_SIZE" -lt 10000000 ]; then
            echo "::warning::DMG < 10MB"
          fi

      - name: Upload DMG Artifact
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LianCoreV3-macOS.dmg
          retention-days: 7