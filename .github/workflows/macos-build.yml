# LianCore V3 - macOS CI/CD Build Verification
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-latest
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-13
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Command Line Tools
        run: |
          echo "=== Checking compiler availability ==="
          echo "CC: $(which cc || echo 'NOT FOUND')"
          echo "CXX: $(which c++ || echo 'NOT FOUND')"
          cc --version 2>&1 || echo "cc not available"
          c++ --version 2>&1 || echo "c++ not available"
          echo "=== Xcode CLT ==="
          xcode-select -p 2>&1 || echo "xcode-select not set"
          # Force install CLT if needed
          if ! cc --version &>/dev/null; then
            echo "Installing Command Line Tools..."
            xcode-select --install 2>&1 || true
            # Wait for CLT to be available
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>&1 || true
          fi
          echo "=== Final compiler check ==="
          cc --version 2>&1
          c++ --version 2>&1

      - name: System Diagnostics
        run: |
          echo "=== System Info ==="
          uname -a
          sw_vers
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "xcodebuild not available"
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Compilers ==="
          cc --version 2>&1
          c++ --version 2>&1
          echo "=== Working Directory ==="
          pwd
          ls -la

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v3

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip \
            "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          echo "JUCE installed at $(pwd)/JUCE"
          ls -la JUCE/

      - name: Configure CMake
        id: cmake_configure
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=Release \
            2>&1 | tee build/cmake_configure.log
          CMAKE_EXIT=${PIPESTATUS[0]}
          echo "CMake exit code: $CMAKE_EXIT"
          exit $CMAKE_EXIT

      - name: Show CMake configure log (on failure)
        if: failure() && steps.cmake_configure.outcome == 'failure'
        run: |
          echo "## CMake Configure Failed (last 200 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 build/cmake_configure.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no log file)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## CMakeError.log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build/CMakeFiles/CMakeError.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no CMakeError.log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload CMake configure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-log-${{ matrix.arch }}
          path: |
            build/cmake_configure.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: warn

      - name: Build VST3 + AU
        run: |
          cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Verify Build Artifacts
        run: |
          echo "=== VST3 ==="
          ls -la build/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore || echo "VST3 binary not found"
          echo "=== AU ==="
          ls -la build/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore || echo "AU binary not found"

      - name: Build Tests
        run: |
          cmake --build build --config Release --target LianCoreTests --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          ./build/tests/Release/LianCoreTests -s

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build/LianCore_artefacts/Release/VST3/
            build/LianCore_artefacts/Release/AU/
          retention-days: 7