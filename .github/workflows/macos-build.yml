# LianCore V3 - macOS CI/CD 构建验证
name: macOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-latest
            cmake_arch: arm64
          - arch: x86_64
            runner: macos-13
            cmake_arch: x86_64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install CMake 3.28.6
        run: |
          curl -L -o cmake.tar.gz "https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-macos-universal.tar.gz"
          tar xzf cmake.tar.gz
          echo "$(pwd)/cmake-3.28.6-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH

      - name: System Diagnostics
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "xcodebuild not available"
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Working Directory ==="
          pwd
          ls -la

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.14-osx-${{ matrix.arch }}-v2

      - name: Download JUCE 8.0.14
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L -o juce-8.0.14-osx.zip \
            "https://github.com/juce-framework/JUCE/releases/download/8.0.14/juce-8.0.14-osx.zip"
          unzip -q juce-8.0.14-osx.zip
          rm juce-8.0.14-osx.zip
          echo "JUCE installed at $(pwd)/JUCE"

      - name: Verify JUCE installation
        run: |
          echo "=== JUCE directory contents ==="
          ls -la JUCE/ || echo "JUCE/ not found"
          ls -la JUCE/CMakeLists.txt || echo "JUCE/CMakeLists.txt not found"
          echo "=== JUCE modules ==="
          ls JUCE/modules/ 2>/dev/null || echo "JUCE/modules/ not found"
          echo "=== Test JUCE path from subdirectory ==="
          mkdir -p test_path
          cd test_path
          echo "Current dir: $(pwd)"
          if [ -f "../JUCE/CMakeLists.txt" ]; then
            echo "JUCE FOUND from test_path: ../JUCE/CMakeLists.txt"
          else
            echo "JUCE NOT FOUND from test_path!"
            ls -la ../
          fi

      - name: Test CMake (minimal - diagnostic)
        run: |
          mkdir -p build_test
          cat > build_test/CMakeLists.txt << 'CMEOF'
          cmake_minimum_required(VERSION 3.24)
          project(Test VERSION 1.0 LANGUAGES CXX)
          message(STATUS "Minimal CMake test: PASSED")
          CMEOF
          cd build_test
          cmake . -G Xcode -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} 2>&1
          echo "Minimal CMake test exit code: $?"

      - name: Test CMake + JUCE (diagnostic - Unix Makefiles)
        run: |
          mkdir -p build_juce_make
          cat > build_juce_make/CMakeLists.txt << 'CMEOF'
          cmake_minimum_required(VERSION 3.24)
          project(JUCE_Test VERSION 1.0 LANGUAGES C CXX)
          if(NOT EXISTS "${CMAKE_SOURCE_DIR}/../JUCE/CMakeLists.txt")
            message(FATAL_ERROR "JUCE not found at ${CMAKE_SOURCE_DIR}/../JUCE")
          endif()
          message(STATUS "JUCE found at ${CMAKE_SOURCE_DIR}/../JUCE")
          add_subdirectory("${CMAKE_SOURCE_DIR}/../JUCE")
          message(STATUS "JUCE add_subdirectory: PASSED")
          CMEOF
          cd build_juce_make
          cmake . -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            2>&1
          echo "JUCE Makefiles test exit code: $?"

      - name: Test CMake + JUCE (diagnostic - Xcode)
        continue-on-error: true
        run: |
          mkdir -p build_juce_xcode
          cat > build_juce_xcode/CMakeLists.txt << 'CMEOF'
          cmake_minimum_required(VERSION 3.24)
          project(JUCE_Test VERSION 1.0 LANGUAGES C CXX)
          if(NOT EXISTS "${CMAKE_SOURCE_DIR}/../JUCE/CMakeLists.txt")
            message(FATAL_ERROR "JUCE not found at ${CMAKE_SOURCE_DIR}/../JUCE")
          endif()
          message(STATUS "JUCE found at ${CMAKE_SOURCE_DIR}/../JUCE")
          add_subdirectory("${CMAKE_SOURCE_DIR}/../JUCE")
          message(STATUS "JUCE add_subdirectory: PASSED")
          CMEOF
          cd build_juce_xcode
          cmake . -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            2>&1
          echo "JUCE Xcode test exit code: $?"

      - name: Configure CMake
        id: cmake_configure
        run: |
          mkdir -p build_m
          cmake -B build_m -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            --log-level=DEBUG \
            > build_m/cmake_configure.log 2>&1
          CMAKE_EXIT=$?
          echo "CMake exit code: $CMAKE_EXIT" | tee -a build_m/cmake_configure.log
          exit $CMAKE_EXIT
        continue-on-error: true

      - name: Show CMake configure log (on failure)
        if: steps.cmake_configure.outcome == 'failure'
        run: |
          echo "## CMake Configure Failed (last 300 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -300 build_m/cmake_configure.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no log file)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## CMakeError.log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build_m/CMakeFiles/CMakeError.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no CMakeError.log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## CMakeOutput.log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build_m/CMakeFiles/CMakeOutput.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no CMakeOutput.log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: CMake trace (on failure, for diagnostics)
        if: steps.cmake_configure.outcome == 'failure'
        run: |
          echo "## CMake --trace-expand (first 500 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cmake -B build_m -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            --trace-expand \
            2>&1 | head -500 >> $GITHUB_STEP_SUMMARY || echo "(trace failed)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload CMake diagnose log
        if: steps.cmake_configure.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cmake-diagnose-${{ matrix.arch }}
          path: |
            build_m/cmake_configure.log
            build_m/CMakeFiles/CMakeError.log
            build_m/CMakeFiles/CMakeOutput.log
          if-no-files-found: warn

      - name: Fail if CMake configure failed
        if: steps.cmake_configure.outcome == 'failure'
        run: exit 1

      - name: Build VST3 + AU
        run: |
          cmake --build build_m --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Verify Build Artifacts
        run: |
          echo "=== VST3 ==="
          ls -la build_m/LianCore_artefacts/Release/VST3/LianCore.vst3/Contents/MacOS/LianCore || echo "VST3 binary not found"
          echo "=== AU ==="
          ls -la build_m/LianCore_artefacts/Release/AU/LianCore.component/Contents/MacOS/LianCore || echo "AU binary not found"

      - name: Build Tests
        run: |
          cmake --build build_m --config Release --target LianCoreTests --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Unit Tests
        run: |
          ./build_m/tests/Release/LianCoreTests -s

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LianCore-macOS-${{ matrix.arch }}
          path: |
            build_m/LianCore_artefacts/Release/VST3/
            build_m/LianCore_artefacts/Release/AU/
          retention-days: 7